<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> 🎵 Music Player</title>
    <link rel="stylesheet" href="music_player.css">
</head>
   <body>

                         <!-- main / parent div tag -->
    <div class=" music-player">
            
        <h1>Music Player</h1>

        <!-- song image -->
         <img src="" alt="Song-Cover" id="cover">

         <h2 id="song-title">Song Title</h2>

        <p id="artist-name">Artist Name</p>
            
                 <!-- audio  element -->
        <audio id="audio-player"></audio>

              <!-- progress bar -->
            <div class="progress-container">
                <span id="current-time">0:00</span>
            
                <input type="range" id="progress-bar" value="0" min="0">
            
                <span id="duration">0:00</span>
            </div>
                       
                    <!-- control buttons -->
           <div class="controls">
               <button id="prev-btn">⏮</button>
               <button id="play-btn">▶</button>
               <button id="next-btn">⏭</button>
           </div> 
           
           <!-- volume control -->
            <div class="volume">
                <label for="volume-slider">🔊</label>
                <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="1">
               
            </div>

                   <!-- progress-bar -->
            
            <!-- <input type="range" id="progress-bar" value="0" min="0"> -->

            <!-- search bar -->
             <input type="text" id="search" placeholder="Search songs...">

             <!-- playlist -->
              <h3>Playlist</h3>
              <ul id="playlist">


              </ul>
    </div>

     <script src="music_player.js"></script>     
    
   </body>
</html>
